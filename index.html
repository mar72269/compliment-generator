    <script>
        /**
         * MODULE: Visualizer3D
         * Architectural Note: Isolated namespace to handle the 3D "Card Art".
         * Rendered strictly within the bounds of the 220px high card container.
         */
        const Visualizer3D = (function() {
            let scene, camera, renderer, boxGroup, innerCore;
            let faces = [];
            let state = 'IDLE'; 
            let baseRotation = 0.005;

            function init() {
                const container = document.getElementById('three-canvas-container');
                
                scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x0F172A, 0.2); 
                
                // Adjusted Camera for the smaller container
                camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
                camera.position.set(2.5, 2.5, 3.5);
                camera.lookAt(0, 0, 0);

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(container.clientWidth, container.clientHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                boxGroup = new THREE.Group();
                scene.add(boxGroup);

                const faceMaterial = new THREE.MeshPhongMaterial({
                    color: 0x1E293B,
                    emissive: 0x14B8A6,
                    emissiveIntensity: 0.1,
                    transparent: true,
                    opacity: 0.9,
                    side: THREE.DoubleSide
                });
                
                const wireframeMaterial = new THREE.MeshBasicMaterial({
                    color: 0x14B8A6,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.4
                });

                // Smaller geometric planes to fit the card art window
                const planeGeom = new THREE.PlaneGeometry(1.2, 1.2);
                const positions = [
                    { pos: [0, 0, 0.6], rot: [0, 0, 0] },         
                    { pos: [0, 0, -0.6], rot: [0, Math.PI, 0] },  
                    { pos: [0, 0.6, 0], rot: [-Math.PI/2, 0, 0] },
                    { pos: [0, -0.6, 0], rot: [Math.PI/2, 0, 0] },
                    { pos: [0.6, 0, 0], rot: [0, Math.PI/2, 0] }, 
                    { pos: [-0.6, 0, 0], rot: [0, -Math.PI/2, 0] } 
                ];

                positions.forEach(p => {
                    const group = new THREE.Group();
                    const mesh = new THREE.Mesh(planeGeom, faceMaterial.clone());
                    const wire = new THREE.Mesh(planeGeom, wireframeMaterial.clone());
                    
                    group.add(mesh);
                    group.add(wire);
                    group.position.set(...p.pos);
                    group.rotation.set(...p.rot);
                    
                    group.userData.basePos = new THREE.Vector3(...p.pos);
                    group.userData.targetPos = new THREE.Vector3(...p.pos).multiplyScalar(2.0); 
                    
                    faces.push(group);
                    boxGroup.add(group);
                });

                // The glowing inner payload
                const coreGeom = new THREE.TorusKnotGeometry(0.3, 0.08, 100, 16);
                const coreMat = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    emissive: 0xffffff,
                    emissiveIntensity: 0.8,
                    wireframe: true
                });
                innerCore = new THREE.Mesh(coreGeom, coreMat);
                innerCore.scale.set(0, 0, 0); 
                scene.add(innerCore);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
                scene.add(ambientLight);
                const pointLight = new THREE.PointLight(0xffffff, 2, 10);
                pointLight.position.set(0, 0, 0); 
                scene.add(pointLight);

                animate();
            }

            function animate() {
                requestAnimationFrame(animate);

                boxGroup.rotation.y += baseRotation;
                boxGroup.rotation.x += baseRotation * 0.5;
                innerCore.rotation.y -= 0.02;
                innerCore.rotation.z -= 0.01;

                if (state === 'PROCESSING') {
                    baseRotation = THREE.MathUtils.lerp(baseRotation, 0.05, 0.05);
                } 
                else if (state === 'REVEALING') {
                    baseRotation = THREE.MathUtils.lerp(baseRotation, 0.002, 0.05);
                    
                    faces.forEach(face => {
                        face.position.lerp(face.userData.targetPos, 0.05);
                        face.children[0].material.opacity = THREE.MathUtils.lerp(face.children[0].material.opacity, 0, 0.05);
                        face.children[1].material.opacity = THREE.MathUtils.lerp(face.children[1].material.opacity, 0, 0.05);
                    });

                    innerCore.scale.lerp(new THREE.Vector3(1, 1, 1), 0.08);
                    
                    if (innerCore.scale.x > 0.95) {
                        setTimeout(() => { if (state === 'REVEALING') resetAnimation(); }, 5000);
                    }
                }

                renderer.render(scene, camera);
            }

            function resetAnimation() {
                state = 'IDLE';
                baseRotation = 0.005;
                
                const resetInterval = setInterval(() => {
                    let done = true;
                    faces.forEach(face => {
                        face.position.lerp(face.userData.basePos, 0.1);
                        face.children[0].material.opacity = THREE.MathUtils.lerp(face.children[0].material.opacity, 0.9, 0.1);
                        face.children[1].material.opacity = THREE.MathUtils.lerp(face.children[1].material.opacity, 0.4, 0.1);
                        if (face.position.distanceTo(face.userData.basePos) > 0.01) done = false;
                    });
                    innerCore.scale.lerp(new THREE.Vector3(0, 0, 0), 0.1);
                    if (done) clearInterval(resetInterval);
                }, 16);
            }

            return {
                init,
                setProcessing: () => { state = 'PROCESSING'; },
                setRevealing: (colorHex) => { 
                    state = 'REVEALING'; 
                    if(colorHex) innerCore.material.emissive.setHex(parseInt(colorHex.replace('#', '0x')));
                }
            };
        })();

        window.addEventListener('load', Visualizer3D.init);
    </script>

    <script>
        /**
         * MODULE: NetworkBackground
         * Architectural Note: A lightweight 2D canvas particle system to render 
         * interactive "data nodes" to enhance the AI/Tech aesthetic.
         */
        const NetworkBackground = (function() {
            let canvas, ctx;
            let particles = [];
            const particleCount = 75; // Number of floating nodes
            const connectionDistance = 150; // Distance at which nodes connect

            function init() {
                canvas = document.getElementById('bg-network');
                ctx = canvas.getContext('2d');
                resize();
                window.addEventListener('resize', resize);
                
                // Initialize particles
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.6, // Velocity X
                        vy: (Math.random() - 0.5) * 0.6, // Velocity Y
                        radius: Math.random() * 1.5 + 0.5
                    });
                }
                animate();
            }

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function animate() {
                requestAnimationFrame(animate);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Update and draw particles
                particles.forEach((p, i) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    
                    // Bounce off screen edges
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    
                    // Draw node
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(20, 184, 166, 0.6)'; // Teal nodes
                    ctx.fill();
                    
                    // Draw connections between nearby nodes
                    for (let j = i + 1; j < particles.length; j++) {
                        const p2 = particles[j];
                        const dx = p.x - p2.x;
                        const dy = p.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < connectionDistance) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            // Opacity fades as nodes get further apart
                            const opacity = 1 - (dist / connectionDistance);
                            ctx.strokeStyle = `rgba(139, 92, 246, ${opacity * 0.3})`; // Purple connecting lines
                            ctx.stroke();
                        }
                    }
                });
            }
            return { init };
        })();

                    if (i < jokeObj.setup.length) {

                typeSetup();
            }

            function typeWriterEffect(text, speed = 30) {
                textContent.innerHTML = '';
                let i = 0;
                function type() {
                    if (i < text.length) {
                        if (text.charAt(i) === '\n') {
                            textContent.innerHTML += '<br>';
                        } else {
                            textContent.innerHTML += text.charAt(i);
                        }
                        i++;
                        setTimeout(type, speed);
