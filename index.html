        /* * Architectural Note: CSS Custom Properties act as our Design Tokens.

         */
        :root {
            --bg-deep-slate: #0F172A;
            --surface-slate: #1E293B;
            --accent-teal: #14B8A6;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            
            --font-standard: 'Inter', sans-serif;
            --font-technical: 'JetBrains Mono', monospace;
            
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --border-radius: 8px;
        }

        * {

            margin: 0;
            padding: 0;
        }

            background-color: var(--bg-deep-slate);
            color: var(--text-primary);
            font-family: var(--font-standard);
            line-height: 1.6;

            display: flex;
            flex-direction: column;
            overflow-x: hidden;

            flex-grow: 1;

        @media (max-width: 860px) {

                grid-template-columns: 1fr;

            }

            padding-bottom: 1.5rem;

            margin-bottom: 0.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;

        .header-section p {

            font-size: 0.95rem;
        }

        .form-group {

        .form-group label {

            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);

            letter-spacing: 0.1em;

            color: var(--text-primary);
            font-family: var(--font-standard);
            font-size: 1rem;
            transition: var(--transition-smooth);

        .form-control:focus {

            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);

            color: var(--accent-teal);
            border: 1px solid var(--accent-teal);
            border-radius: 6px;
            font-family: var(--font-technical);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;

            text-transform: uppercase;
            letter-spacing: 1px;

        .btn-submit:disabled {

            cursor: not-allowed;

            color: var(--text-secondary);
        }

        .visualization-panel {

            flex-direction: column;
            gap: 1.5rem;
            height: 100%;

        #three-canvas-container {

            border-radius: var(--border-radius);

            border-top: 4px solid var(--accent-teal);
            border-radius: var(--border-radius);
            display: flex;
            flex-direction: column;

            line-height: 1.8;

            height: 450px;

            flex: 0 0 450px;

            transition: var(--transition-smooth);

        }

        .result-container::before {

            background: radial-gradient(circle at center, rgba(20, 184, 166, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);

        .terminal-dot {

<body>

            </div>
            
            <!-- Processed Data Output -->
            <div class="result-container">
                <div class="terminal-header">
                    <div class="terminal-dot dot-red"></div>
                    <div class="terminal-dot dot-yellow"></div>

                    <div class="terminal-title">~/ai/payload-viewer.sh</div>
                </div>
                <div class="result-scroll-area">

> Initialize connection to establish data flow...
> Awaiting system parameters.
                    </div>
                </div>
            </div>
        </div>

    <script>
        /**
         * MODULE: Visualizer3D
         * Architectural Note: Isolated namespace using IIFE. This prevents global scope 
         * pollution. The module exposes a strict API (init, process, reveal) that the 
         * main application controller can call based on network states.
         */
        const Visualizer3D = (function() {
            let scene, camera, renderer, boxGroup, innerCore;
            let faces = [];
            let particleSystem;
            
            // Animation state machine
            let state = 'IDLE'; // IDLE, PROCESSING, REVEALING
            let baseRotation = 0.005;

            function init() {
                const container = document.getElementById('three-canvas-container');
                
                // 1. Scene Setup
                scene = new THREE.Scene();
                // Fog adds depth and blends into the background color
                scene.fog = new THREE.FogExp2(0x1E293B, 0.15); 
                
                // 2. Camera Setup
                camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
                camera.position.set(3, 3, 5);
                camera.lookAt(0, 0, 0);

                // 3. Renderer Setup
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(container.clientWidth, container.clientHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for performance
                container.appendChild(renderer.domElement);

                // 3.5 Particle System (Visual Interest)
                const particleCount = 200;
                const particleGeometry = new THREE.BufferGeometry();
                const particlePositions = new Float32Array(particleCount * 3);
                
                for(let i = 0; i < particleCount * 3; i++) {
                    particlePositions[i] = (Math.random() - 0.5) * 10;
                }
                
                particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
                const particleMaterial = new THREE.PointsMaterial({
                    color: 0x14B8A6,
                    size: 0.05,
                    transparent: true,
                    opacity: 0.4,
                    blending: THREE.AdditiveBlending
                });
                
                particleSystem = new THREE.Points(particleGeometry, particleMaterial);
                scene.add(particleSystem);

                // 4. Constructing the Data Box (The Envelope)
                boxGroup = new THREE.Group();
                scene.add(boxGroup);

                // Material for the outer box faces
                const faceMaterial = new THREE.MeshPhongMaterial({
                    color: 0x0F172A,
                    emissive: 0x14B8A6,
                    emissiveIntensity: 0.15,
                    transparent: true,
                    opacity: 0.9,
                    side: THREE.DoubleSide,
                    wireframe: false
                });
                
                const wireframeMaterial = new THREE.MeshBasicMaterial({
                    color: 0x14B8A6,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.3
                });

                // Create 6 separate planes to form a box so they can animate independently
                const planeGeom = new THREE.PlaneGeometry(1.5, 1.5);
                const positions = [
                    { pos: [0, 0, 0.75], rot: [0, 0, 0] },         // Front
                    { pos: [0, 0, -0.75], rot: [0, Math.PI, 0] },  // Back
                    { pos: [0, 0.75, 0], rot: [-Math.PI/2, 0, 0] },// Top
                    { pos: [0, -0.75, 0], rot: [Math.PI/2, 0, 0] },// Bottom
                    { pos: [0.75, 0, 0], rot: [0, Math.PI/2, 0] }, // Right
                    { pos: [-0.75, 0, 0], rot: [0, -Math.PI/2, 0] } // Left
                ];

                positions.forEach(p => {
                    const group = new THREE.Group();
                    
                    const mesh = new THREE.Mesh(planeGeom, faceMaterial.clone());
                    const wire = new THREE.Mesh(planeGeom, wireframeMaterial.clone());
                    
                    group.add(mesh);
                    group.add(wire);
                    
                    group.position.set(...p.pos);
                    group.rotation.set(...p.rot);
                    
                    // Store base positions for animation
                    group.userData.basePos = new THREE.Vector3(...p.pos);
                    group.userData.targetPos = new THREE.Vector3(...p.pos).multiplyScalar(2.5); // Explode outwards
                    
                    faces.push(group);
                    boxGroup.add(group);
                });

                // 5. Constructing the Inner Data Core (The Payload)
                // Using TorusKnot instead of Icosahedron for a more complex, technical look
                const coreGeom = new THREE.TorusKnotGeometry(0.35, 0.08, 100, 16);
                const coreMat = new THREE.MeshStandardMaterial({
                    color: 0x14B8A6,
                    emissive: 0x14B8A6,
                    emissiveIntensity: 0.8,
                    wireframe: true
                });
                innerCore = new THREE.Mesh(coreGeom, coreMat);
                innerCore.scale.set(0, 0, 0); // Hidden initially
                scene.add(innerCore);

                // 6. Lighting
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
                scene.add(ambientLight);
                const pointLight = new THREE.PointLight(0x14B8A6, 2, 10);
                pointLight.position.set(0, 0, 0); // Light emanates from center
                scene.add(pointLight);

                // Event Listeners & Boot Loop
                window.addEventListener('resize', onWindowResize, false);
                animate();
            }

            function onWindowResize() {
                const container = document.getElementById('three-canvas-container');
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            }

            function animate() {
                requestAnimationFrame(animate);

                // Constant rotation
                boxGroup.rotation.y += baseRotation;
                boxGroup.rotation.x += baseRotation * 0.5;
                innerCore.rotation.y -= 0.02;
                innerCore.rotation.z -= 0.01;
                
                if (particleSystem) {
                    particleSystem.rotation.y += 0.001;
                    particleSystem.rotation.x += 0.0005;
                }

                // State Machine Animation Logic
                if (state === 'PROCESSING') {
                    // Accelerate rotation to indicate network request inflight
                    baseRotation = THREE.MathUtils.lerp(baseRotation, 0.04, 0.05);
                } 
                else if (state === 'REVEALING') {
                    // Slow down rotation
                    baseRotation = THREE.MathUtils.lerp(baseRotation, 0.002, 0.05);
                    
                    // Explode box faces outward and fade them out
                    faces.forEach(face => {
                        face.position.lerp(face.userData.targetPos, 0.05);
                        // Access the solid mesh and wireframe mesh to reduce opacity
                        face.children[0].material.opacity = THREE.MathUtils.lerp(face.children[0].material.opacity, 0, 0.05);
                        face.children[1].material.opacity = THREE.MathUtils.lerp(face.children[1].material.opacity, 0, 0.05);
                    });

                    // Reveal the inner core (payload)
                    innerCore.scale.lerp(new THREE.Vector3(1, 1, 1), 0.08);
                    
                    // Reset to idle after a few seconds
                    if (innerCore.scale.x > 0.95) {
                        setTimeout(() => { if (state === 'REVEALING') resetAnimation(); }, 4000);
                    }
                }

                renderer.render(scene, camera);
            }

            function resetAnimation() {
                state = 'IDLE';
                baseRotation = 0.005;
                
                // Animate everything back to starting positions
                const resetInterval = setInterval(() => {
                    let done = true;
                    
                    faces.forEach(face => {
                        face.position.lerp(face.userData.basePos, 0.1);
                        face.children[0].material.opacity = THREE.MathUtils.lerp(face.children[0].material.opacity, 0.9, 0.1);
                        face.children[1].material.opacity = THREE.MathUtils.lerp(face.children[1].material.opacity, 0.3, 0.1);
                        
                        if (face.position.distanceTo(face.userData.basePos) > 0.01) done = false;
                    });

                    innerCore.scale.lerp(new THREE.Vector3(0, 0, 0), 0.1);

                    if (done) clearInterval(resetInterval);
                }, 16);
            }

            // Expose public API
            return {
                init: init,
                setProcessing: () => { state = 'PROCESSING'; },
                setRevealing: () => { state = 'REVEALING'; }
            };
        })();

        // Initialize rendering pipeline on load
        window.addEventListener('load', Visualizer3D.init);
    </script>

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // 1. Capture Inputs
                const payload = {
                    tone: document.getElementById('tone').value,
                    topic: document.getElementById('topic').value,
                    focus_area: document.getElementById('focus_area').value || "holistic integration"
                };

                // 2. Update System State (UI & 3D)
                updateUIState('LOADING');
                
                try {
                    // 3. Dispatch Network Request (Fetch API)
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const data = await response.json();
                    
                    // 4. Handle Success Response
                    handlePayloadReceived(data.compliment, true);

                } catch (error) {
                    console.warn("Backend connection failed. Sandbox fallback initiated.");
                    
                    // Fallback execution for sandboxed environments (portfolio viewing)
                    setTimeout(() => {
                        // Select a random compliment from the 100 unique options
                        const randomIndex = Math.floor(Math.random() * mockCompliments.length);
                        let mockCompliment = mockCompliments[randomIndex];

                        // Personalize it slightly with the user's topic if it's not already a generic one
                        // (Most are generic to be funny/applicable, but we can prefix the topic for some flavor)
                        if (!mockCompliment.includes(payload.topic)) {
                             mockCompliment = `[Topic: ${payload.topic}] ${mockCompliment}`;
                        }

                        handlePayloadReceived(mockCompliment, false);
                    }, 1800); // Simulate network latency
                }
            });

            function updateUIState(state) {
                if (state === 'LOADING') {
                    submitBtn.disabled = true;
                    btnText.style.display = 'none';
                    loader.style.display = 'block';
                    
                    resultContainer.classList.remove('success-pulse'); // Remove pulse if it exists
                    resultText.innerHTML = '';
                    resultText.classList.remove('placeholder-text');
                    
                    stateBadge.textContent = "SYS: HTTP POST INFLIGHT";
                    stateBadge.style.color = "#F59E0B"; // Amber
                    stateBadge.style.borderColor = "rgba(245, 158, 11, 0.3)";
                    
                    Visualizer3D.setProcessing();
                } 
                else if (state === 'SUCCESS') {
                    submitBtn.disabled = false;
                    btnText.style.display = 'block';
                    loader.style.display = 'none';
                }
            }

            function handlePayloadReceived(text, isLive) {
                updateUIState('SUCCESS');
                
                // Add pulse animation for visual interest
                resultContainer.classList.add('success-pulse');

                // Update system badge based on connection type
                if (isLive) {
                    stateBadge.textContent = "SYS: WEBHOOK DISPATCHED / 200 OK";
                    stateBadge.style.color = "#14B8A6"; // Teal
                    stateBadge.style.borderColor = "rgba(20, 184, 166, 0.3)";
                } else {
                    stateBadge.textContent = "SYS: MOCK PAYLOAD / FALLBACK OK";
                    stateBadge.style.color = "#8B5CF6"; // Purple
                    stateBadge.style.borderColor = "rgba(139, 92, 246, 0.3)";
                }
                
                // Trigger 3D unpacking animation
                Visualizer3D.setRevealing();

                // Format text for terminal output
                const formattedText = `> [SYSTEM] Payload successfully decrypted.\n> [TIMESTAMP] ${new Date().toISOString()}\n\n${text}`;

                // Render text with a technical terminal typing effect
                typeWriterEffect(formattedText, resultText, 20);
            }

            function typeWriterEffect(text, element, speed = 25) {
                element.innerHTML = '';
                element.classList.add('cursor-blink'); // Ensure cursor is active during typing
                let i = 0;
                
                // Auto-scroll to bottom as it types
                const scrollContainer = document.querySelector('.result-scroll-area');
                
                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i);
                        i++;
                        if (scrollContainer) scrollContainer.scrollTop = scrollContainer.scrollHeight;
                        setTimeout(type, speed);
                    }
                }
                type();
            }
        });
    </script>
