<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Output Engine | Card UI</title>
    
    <!-- External Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-deep-slate: #0F172A;
            --surface-slate: #1E293B;
            --accent-teal: #14B8A6;
            --accent-purple: #8B5CF6;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --font-standard: 'Inter', sans-serif;
            --font-technical: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep-slate);
            color: var(--text-primary);
            font-family: var(--font-standard);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .aurora-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            overflow: hidden;
            background: #0F172A;
            pointer-events: none;
        }

        .aurora-bg::before,
        .aurora-bg::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: float-aurora 25s infinite alternate ease-in-out;
        }

        .aurora-bg::before {
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(20,184,166,0.2) 0%, transparent 60%);
            top: -10vw; left: -10vw;
        }

        .aurora-bg::after {
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(139,92,246,0.2) 0%, transparent 60%);
            bottom: -10vw; right: -10vw;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        @keyframes float-aurora {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5vw, 5vh) scale(1.1); }
        }

        /* Subtle Grid Overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 1;
        }

        .app-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .playing-card {
            width: 360px;
            height: 504px;
            background: linear-gradient(145deg, #1E293B, #151d2b);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.7),
                inset 0 1px 1px rgba(255, 255, 255, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Internal Card Icons */
        .card-icon {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            z-index: 10;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            transition: all 0.4s ease;
        }
        
        .card-icon-top { top: 15px; right: 15px; }
        .card-icon-bottom { bottom: 15px; left: 15px; }

        /* Card Art (3D Scene) */
        .card-art {
            width: 100%;
            height: 220px;
            background-color: #0B1121;
            border-radius: 8px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .arch-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: var(--font-technical);
            font-size: 0.65rem;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.5);
            padding: 3px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 10;
            transition: all 0.3s;
        }

        /* Card Text Effect Area */
        .card-effect {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            font-family: var(--font-technical);
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow-y: auto;
            position: relative;
        }

        .card-effect::-webkit-scrollbar { width: 6px; }
        .card-effect::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .card-effect::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .placeholder-text {
            color: var(--text-secondary);
            font-style: italic;
            opacity: 0.6;
        }

        .button-group {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 20px;
            background: transparent;
            border-radius: 8px;
            font-family: var(--font-technical);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-compliment {
            border: 1px solid var(--accent-teal);
            color: var(--accent-teal);
        }
        .btn-compliment:hover {
            background: rgba(20, 184, 166, 0.1);
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.2);
        }

        .btn-joke {
            border: 1px solid var(--accent-purple);
            color: var(--accent-purple);
        }
        .btn-joke:hover {
            background: rgba(139, 92, 246, 0.1);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }
        
        .action-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <!-- Ambient Background -->
    <div class="aurora-bg"></div>

    <div class="app-wrapper">
        
        <!-- The Playing Card -->
        <div class="playing-card">
            <!-- Dynamic Icons -->
            <div class="card-icon card-icon-top" id="icon-top">?</div>
            <div class="card-icon card-icon-bottom" id="icon-bottom">?</div>

            <!-- Card Art (Three.js Canvas) -->
            <div id="three-canvas-container" class="card-art">
                <div class="arch-badge" id="state-badge">SYS: AWAITING INPUT</div>
            </div>

            <!-- Card Effect (Text Output) -->
            <div class="card-effect" id="output-container">
                <div id="text-output" class="placeholder-text">
                    > System initialized.<br>
                    > Select an action below to generate an artifact...
                </div>
            </div>
        </div>

        <!-- Action Controls -->
        <div class="button-group">
            <button id="compliment-btn" class="action-btn btn-compliment">Generate Compliment</button>
            <button id="joke-btn" class="action-btn btn-joke">Generate Joke</button>
        </div>

    </div>

    <script>
        const Visualizer3D = (function() {
            let scene, camera, renderer, objectGroup, particles;
            let targetSpeed = 0.005;
            let currentSpeed = 0.005;

            function init() {
                const container = document.getElementById('three-canvas-container');
                scene = new THREE.Scene();
                
                camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
                camera.position.z = 4;

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(container.clientWidth, container.clientHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                objectGroup = new THREE.Group();
                scene.add(objectGroup);

                // Core Shape (Torus Knot)
                const geometry = new THREE.TorusKnotGeometry(0.6, 0.2, 100, 16);
                const material = new THREE.MeshPhysicalMaterial({
                    color: 0x14B8A6,
                    emissive: 0x14B8A6,
                    emissiveIntensity: 0.1,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.8
                });
                const knot = new THREE.Mesh(geometry, material);
                objectGroup.add(knot);

                // Particle Ring
                const partGeom = new THREE.BufferGeometry();
                const partCount = 150;
                const posArray = new Float32Array(partCount * 3);
                for(let i = 0; i < partCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 4;
                }
                partGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const partMat = new THREE.PointsMaterial({
                    size: 0.03,
                    color: 0x8B5CF6,
                    transparent: true,
                    opacity: 0.6
                });
                particles = new THREE.Points(partGeom, partMat);
                scene.add(particles);

                window.addEventListener('resize', () => {
                    camera.aspect = container.clientWidth / container.clientHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(container.clientWidth, container.clientHeight);
                });

                animate();
            }

            function animate() {
                requestAnimationFrame(animate);
                
                // Smooth speed transitions
                currentSpeed += (targetSpeed - currentSpeed) * 0.05;
                
                objectGroup.rotation.x += currentSpeed;
                objectGroup.rotation.y += currentSpeed * 1.5;
                
                particles.rotation.y -= currentSpeed * 0.5;
                particles.rotation.z += currentSpeed * 0.2;

                renderer.render(scene, camera);
            }

            return {
                init: init,
                setFast: () => { targetSpeed = 0.08; },
                setNormal: () => { targetSpeed = 0.005; }
            };
        })();

        window.addEventListener('load', Visualizer3D.init);

        document.addEventListener('DOMContentLoaded', () => {
            const complimentBtn = document.getElementById('compliment-btn');
            const jokeBtn = document.getElementById('joke-btn');
            const resultText = document.getElementById('text-output');

            const iconTop = document.getElementById('icon-top');
            const iconBottom = document.getElementById('icon-bottom');

            // EXACTLY 100 Quirky/Funny Compliments

                "You're more invaluable than a pristine backup before a major database migration.",
                "Your passion for tech shines brighter than a mechanical keyboard on max RGB.",
                "You're as satisfying to work with as the 'click' of blue switches.",
                "Your unit tests are so thorough they scare the bugs away.",
                "You're a beacon of knowledge in the foggy landscape of software architecture.",
                "You learn new frameworks faster than `npm install` runs on a gigabit connection.",
                "You're the 'it just works' of people.",
                "Your PRs are like gold nuggets in a stream of silt.",
                "You make scaling cloud infrastructure look like absolute magic.",
                "Your understanding of microservices is macro-impressive.",
                "You're the semicolon that makes everything run smoothly.",
                "Your technical foresight is like having a time machine for dependencies.",
                "Your work ethic is as solid as a perfectly configured firewall.",
                "Your ability to abstract complexity is a true gift to humanity.",
                "You find the needle in the haystack, and then optimize the hay.",
                "Your knowledge is deep, like an immaculately designed data lake.",
                "Things just happen faster when you're around, like a local cache hit.",
                "Your perspective is as refreshing as hard-refreshing the browser.",
                "You're a true terminal warrior; GUI is for mortals.",
                "Your calm under pressure has lower latency than a localhost ping.",

                "You're a joy to collaborate with—zero merge conflicts ever.",
                "Your focus is sharper than a 4K retina display.",
                "You're the human equivalent of an NVMe SSD—fast and reliable.",
                "Your strategic thinking is a perfectly planned product roadmap.",
                "You're a ray of sunshine in a windowless server room.",
                "Your positive attitude is the best framework for success.",
                "You definitely have keyboard shortcuts for real life.",
                "Your brain connects dots like a highly optimized graph database.",
                "People naturally follow your commit history.",
                "Your insights are more valuable than a zero-day patch.",
                "You're the ultimate team player, always passing the correct parameters.",
                "Your creativity scales better than AWS.",
                "Your analytical skills are sharper than a physical server rack edge.",
                "You see the future of tech before it's even merged to the main branch.",
                "Your execution is as reliable as a cron job.",
                "You're the eye of the storm during a major deployment.",
                "Your intellectual curiosity is like an infinite while loop.",
                "You bridge the gap between tech and non-tech flawlessly.",
                "Your dedication to quality is immutable, just like blockchain.",
                "Your value appreciates faster than an early-stage tech startup.",
                "Your intuition beats any A/B test results.",
                "You're a walking, talking Stack Overflow answer.",
                "You adapt to scope changes faster than a hot-reload module.",
                "You fix things before the monitoring alerts even fire.",
                "Your generosity with knowledge is the best open-source contribution.",
                "You're a 10x developer without the 10x ego.",
                "Your ability to focus is like a dedicated GPU for your brain.",
                "You're a breath of fresh air in a stuffy Zoom meeting.",
                "Your innovative spirit is the engine driving this repo forward.",
                "You juggle tasks flawlessly, like a perfectly tuned async event loop.",
                "Your attention to detail is quite literally pixel-perfect.",
                "You're the super-strong adhesive holding this architecture together.",
                "You bounce back from errors faster than a resilient K8s pod.",
                "Your strategic vision is crystal clear.",
                "You get things done in O(1) constant time.",
                "Your energy is a fully charged battery pack for the team.",
                "You make pair programming an absolute joy.",
                "Your integrity is as unbreakable as RSA encryption.",
                "You always deliver, just like a verified webhook.",
                "Your sense of humor is a feature, definitely not a bug.",
                "You're proof that great engineers exist outside of fairy tales.",
                "Your code is so readable it could be published as a novel.",
                "You navigate complex codebases like a GPS system.",
                "You handle edge cases with grace and style.",
                "Your persistence in debugging is truly legendary.",
                "You bring out the best in the compiler and the team.",
                "Your architectural decisions stand the test of time.",
                "You're simply a phenomenal engineer, period."
            ];

            // EXACTLY 50 Jokes (Format: Setup|Punchline)
            const jokes = [
                "Why do programmers prefer dark mode?|Because light attracts bugs.",
                "How many programmers does it take to change a light bulb?|None, that's a hardware problem.",
                "What is a programmer's favorite hangout place?|Foo Bar.",
                "Why did the programmer quit his job?|Because he didn't get arrays.",
                "Why do Java programmers have to wear glasses?|Because they don't C#.",
                "A SQL query goes into a bar, walks up to two tables and asks...|'Can I join you?'",
                "How do you comfort a JavaScript bug?|You console it.",
                "Why did the developer go broke?|Because he used up all his cache.",
                "What's an algorithm?|A word used by programmers when they don't want to explain what they did.",
                "Why did the functions stop calling each other?|Because they had constant arguments.",
                "Why do programmers always mix up Halloween and Christmas?|Because Oct 31 equals Dec 25.",
                "What is a database administrator's favorite tone of voice?|Relational.",
                "Why did the private class member feel lonely?|Because nobody could access it.",
                "How do you know if a person is a Vim user?|Don't worry, they'll tell you.",
                "Why did the edge server cross the road?|To get closer to the user.",
                "What do you call a programmer from Finland?|Nerdic.",
                "Why do developers hate nature?|It has too many bugs and no documentation.",
                "What is the most used language in programming?|Profanity.",
                "Why was the JavaScript developer sad?|Because he didn't know how to express his feelings.",
                "How does a computer catch a cold?|From a virus.",
                "Why did the integer break up with the float?|Because it couldn't handle the decimals.",
                "What did the router say to the doctor?|It hurts when IP.",

                "What is the object-oriented way to become wealthy?|Inheritance.",
                "Why do C programmers never die?|They are just cast into void.",
                "What's a programmer's favorite clothing brand?|JSON Derulo.",
                "Why did the CSS developer go to therapy?|To fix his margins.",
                "Why did the developer bring a ladder to the bar?|He heard the drinks were on the house.",
                "What is a computer's favorite beat?|An algo-rhythm.",
                "Why did the variable break down?|It lost its identity.",
                "Why do Python developers need glasses?|Because they have weak typing.",
                "What do you call an arrogant insect?|A bug that thinks it's a feature.",
                "How does a developer propose?|'Will you marry me? (Y/N)'",
                "Why did the backend developer break up with the frontend developer?|There were too many unresolved conflicts.",
                "What do computers eat for a snack?|Microchips.",
                "Why did the loop go to the doctor?|It couldn't break out.",
                "How many testers does it take to change a light bulb?|None, they just report that it's dark.",
                "Why are assembly programmers always tired?|Because they work at the machine level.",
                "What is a spider's favorite programming language?|Web design.",
                "Why did the developer get stuck in the shower?|The instructions said: wash, rinse, repeat.",
                "What did the array say to the string?|Stop being so sensitive.",
                "Why did the programmer stay at home?|Because there's no place like 127.0.0.1.",
                "What is a database's favorite movie?|The Matrix.",
                "Why did the cloud architect get promoted?|He had high availability.",
                "What's a hacker's favorite season?|Phishing season.",
                "Why did the developer cross the road?|To `git` to the other side.",
                "Why are developers so calm?|Because they know how to try and catch their exceptions."
            ];

            const icons = ['✨', '🚀', '🧠', '💡', '🔥', '⚡', '🤖', '🔮', '🎉', '🌟', '💻', '💎', '⚛️', '🎲'];
            const colors = ['#14B8A6', '#8B5CF6', '#F59E0B', '#EF4444', '#3B82F6', '#10B981', '#EC4899'];

            function updateCardIcons() {
                // Select ONE random icon and ONE random color for both circles
                const randomIcon = icons[Math.floor(Math.random() * icons.length)];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                
                [iconTop, iconBottom].forEach(el => {
                    el.textContent = randomIcon;
                    el.style.backgroundColor = `${randomColor}20`; // 20% opacity background
                    el.style.color = randomColor;
                    el.style.borderColor = `${randomColor}50`;
                    
                    // Add a tiny bounce animation
                    el.style.transform = 'scale(1.2)';
                    setTimeout(() => { el.style.transform = 'scale(1)'; }, 200);
                });
            }

            function triggerReveal(text, isJoke = false) {
                // 1. Update visual elements
                updateCardIcons();
                Visualizer3D.setFast();
                
                resultText.innerHTML = '';
                resultText.classList.remove('placeholder-text');
                
                stateBadge.textContent = "SYS: FETCHING...";
                stateBadge.style.color = "#F59E0B";
                stateBadge.style.borderColor = "rgba(245, 158, 11, 0.4)";
                
                // 2. Simulate slight network delay before typing
                setTimeout(() => {
                    Visualizer3D.setNormal();
                    
                    if (isJoke) {
                        stateBadge.textContent = "SYS: JOKE_PAYLOAD OK";
                        stateBadge.style.color = "#8B5CF6";
                        stateBadge.style.borderColor = "rgba(139, 92, 246, 0.4)";
                        
                        const parts = text.split('|');
                        // Type Setup
                        typeWriterEffect(parts[0], resultText, 30, () => {
                            if (parts.length > 1) {
                                // 2 Second Dramatic Pause
                                setTimeout(() => {
                                    resultText.innerHTML += '<br><br>';
                                    // Type Punchline
                                    typeWriterEffect(parts[1], resultText, 30, null, true);
                                }, 2000); 
                            }
                        });
                    } else {
                        stateBadge.textContent = "SYS: COMPLIMENT_PAYLOAD OK";
                        stateBadge.style.color = "#14B8A6";
                        stateBadge.style.borderColor = "rgba(20, 184, 166, 0.4)";
                        
                        // Type Compliment
                        typeWriterEffect(text, resultText, 25);
                    }
                }, 600);
            }

            function typeWriterEffect(text, element, speed = 25, callback = null, append = false) {
                if (!append) element.innerHTML = '';
                let i = 0;
                
                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i);
                        i++;
                        // Scroll to bottom automatically if text gets long
                        element.parentElement.scrollTop = element.parentElement.scrollHeight;
                        setTimeout(type, speed);
                    } else if (callback) {
                        callback();
                    }
                }
                type();
            }

            complimentBtn.addEventListener('click', () => {
                const random = compliments[Math.floor(Math.random() * compliments.length)];
                triggerReveal(random, false);
            });

            jokeBtn.addEventListener('click', () => {
                const random = jokes[Math.floor(Math.random() * jokes.length)];
                triggerReveal(random, true);
            });
        });
    </script>
</body>
